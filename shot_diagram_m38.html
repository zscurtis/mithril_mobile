<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#171717" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MITHRIL" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="192x192" href="./icons/mithril-192.png?v=38.5" />
<link rel="apple-touch-icon-precomposed" sizes="192x192" href="./icons/mithril-192.png?v=38.5" />
<link rel="icon" type="image/png" sizes="192x192" href="./icons/mithril-192.png?v=38.5" />
<link rel="icon" type="image/png" sizes="512x512" href="./icons/mithril-512.png?v=38.5" />
<title>MITHRIL Shot Diagram m38.5</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #242424;
  }
  #shotFrame {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: #242424;
  }
  #fallbackHome {
    display: none;
    position: fixed;
    left: 8px;
    top: 8px;
    z-index: 1000;
    min-height: 40px;
    border: 1px solid #777;
    border-radius: 8px;
    background: #fff;
    color: #111;
    padding: 6px 10px;
    font: 800 14px Arial, sans-serif;
  }
</style>
</head>
<body>
<button id="fallbackHome" type="button">MITHRIL Home</button>
<iframe id="shotFrame" src="./shot_diagram_m34.html" title="MITHRIL Shot Diagram"></iframe>
<script>
(() => {
  "use strict";

  const frame = document.getElementById("shotFrame");
  const fallbackHome = document.getElementById("fallbackHome");

  function homeURL() {
    return "./index.html?refresh=" + Date.now();
  }

  function saveShotState() {
    try {
      const shotWindow = frame.contentWindow;
      if (shotWindow && typeof shotWindow.saveData === "function") shotWindow.saveData();
      if (shotWindow && typeof shotWindow.saveView === "function") shotWindow.saveView();
    } catch (error) {
      console.warn("MITHRIL could not call the shot save functions before returning Home.", error);
    }
  }

  function goHome() {
    saveShotState();
    window.location.href = homeURL();
  }

  fallbackHome.addEventListener("click", goHome);

  frame.addEventListener("load", () => {
    try {
      const doc = frame.contentDocument;
      if (!doc) throw new Error("Shot Diagram document was unavailable.");

      doc.title = "MITHRIL Shot Diagram m38.5";

      const injectedStyle = doc.createElement("style");
      injectedStyle.textContent = `
        html, body { width: 100% !important; }
        header {
          top: 0 !important;
          right: 0 !important;
          bottom: auto !important;
          left: 0 !important;
          width: 100% !important;
        }
        .modal {
          top: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          left: 0 !important;
        }
        .brand.mithrilHomeLink {
          cursor: pointer;
          border: 0;
          border-radius: 8px;
          background: transparent;
          padding: 0;
          min-height: 36px;
          user-select: none;
        }
        .brand.mithrilHomeLink:active { opacity: .72; }
        .brand.mithrilHomeLink .mark {
          display: block;
          width: 34px;
          height: 34px;
          border-radius: 8px;
          object-fit: cover;
          background: none;
          color: transparent;
          flex: 0 0 auto;
        }
      `;
      doc.head.appendChild(injectedStyle);

      const brand = doc.querySelector(".brand");
      if (!brand) throw new Error("Shot Diagram brand area was not found.");

      const oldMark = brand.querySelector(".mark");
      if (oldMark) {
        const icon = doc.createElement("img");
        icon.className = "mark";
        icon.src = "./icons/mithril-192.png?v=38.5";
        icon.alt = "MITHRIL";
        icon.addEventListener("error", () => {
          icon.src = "https://zscurtis.github.io/mithril_mobile/icons/mithril-192.png?v=38.5";
        }, { once: true });
        oldMark.replaceWith(icon);
      }

      const brandText = brand.querySelector(".brandText");
      if (brandText) brandText.textContent = "SHOT DIAGRAM";

      const version = brand.querySelector(".version");
      if (version) version.textContent = "m38.5";

      brand.classList.add("mithrilHomeLink");
      brand.setAttribute("role", "button");
      brand.setAttribute("tabindex", "0");
      brand.setAttribute("aria-label", "Save Shot Diagram and return to MITHRIL Home");
      brand.setAttribute("title", "MITHRIL Home / Choose Template");
      brand.addEventListener("click", goHome);
      brand.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goHome();
        }
      });

      const menuModal = doc.getElementById("menuModal");
      const firstMenuGrid = menuModal ? menuModal.querySelector(".menuGrid") : null;
      if (firstMenuGrid && !doc.getElementById("mithrilHomeMenuButton")) {
        const homeButton = doc.createElement("button");
        homeButton.id = "mithrilHomeMenuButton";
        homeButton.type = "button";
        homeButton.className = "wide";
        homeButton.textContent = "Home / Choose Template";
        homeButton.addEventListener("click", goHome);
        firstMenuGrid.prepend(homeButton);
      }

      const performanceScript = doc.createElement("script");
      performanceScript.textContent = `
        (function () {
          if (window.__mithrilShotPerformanceInstalled) return;
          window.__mithrilShotPerformanceInstalled = true;

          var ua = String(navigator.userAgent || "");
          var iosMatch = ua.match(/(?:CPU (?:iPhone )?OS|OS) (\\d+)[_\\.]/i);
          var safariMatch = ua.match(/Version\\/(\\d+)/i);
          var iosMajor = iosMatch ? Number(iosMatch[1]) : null;
          var safariMajor = safariMatch ? Number(safariMatch[1]) : null;
          var touchCapable = ("ontouchstart" in window) || Number(navigator.maxTouchPoints || 0) > 0;
          var performanceMode = touchCapable && (
            !("PointerEvent" in window) ||
            (iosMajor !== null && iosMajor <= 15) ||
            (safariMajor !== null && safariMajor <= 15) ||
            Number(navigator.hardwareConcurrency || 4) <= 3
          );
          window.__mithrilShotLegacyPerformanceMode = performanceMode;

          var originalResizeCanvas = resizeCanvas;
          resizeCanvas = function () {
            if (!performanceMode) return originalResizeCanvas();
            dpr = 1;
            var rect = wrap.getBoundingClientRect();
            canvas.width = Math.max(1, Math.floor(rect.width));
            canvas.height = Math.max(1, Math.floor(rect.height));
            canvas.style.width = rect.width + "px";
            canvas.style.height = rect.height + "px";
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            draw();
          };

          var originalDraw = draw;
          var lastUiUpdate = 0;
          function drawVisiblePagesOnly() {
            var rect = wrap.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            ctx.fillStyle = "#2e2e2e";
            ctx.fillRect(0, 0, rect.width, rect.height);

            var safeScale = Math.max(view.scale, 0.0001);
            var viewport = {
              left: (-view.x) / safeScale,
              top: (-view.y) / safeScale,
              right: (rect.width - view.x) / safeScale,
              bottom: (rect.height - view.y) / safeScale
            };
            var pad = 120;

            ctx.save();
            ctx.translate(view.x, view.y);
            ctx.scale(view.scale, view.scale);

            getPageNumbers().forEach(function (pageNum) {
              var origin = pageOrigin(pageNum);
              if (origin.x + IMG_W < viewport.left - pad || origin.x > viewport.right + pad ||
                  origin.y + IMG_H < viewport.top - pad || origin.y > viewport.bottom + pad) return;

              ctx.save();
              ctx.translate(origin.x, origin.y);
              if (img.complete) ctx.drawImage(img, 0, 0, IMG_W, IMG_H);
              if (pageNum === currentPage) {
                ctx.save();
                ctx.strokeStyle = "rgba(31,111,235,.95)";
                ctx.lineWidth = 10 / view.scale;
                ctx.strokeRect(4, 4, IMG_W - 8, IMG_H - 8);
                ctx.restore();
              }
              drawPageLabel(pageNum);
              drawHoleHighlights(pageNum);
              drawHeaderText(pageNum);
              drawHoleText(pageNum);
              ctx.restore();
            });

            ctx.restore();
            var now = Date.now();
            if (now - lastUiUpdate >= 100) {
              lastUiUpdate = now;
              syncZoomSlider();
              updateStatus();
            }
          }

          var renderNow = performanceMode ? drawVisiblePagesOnly : originalDraw;
          var drawQueued = false;
          draw = function () {
            if (drawQueued) return;
            drawQueued = true;
            (window.requestAnimationFrame || function (cb) { return setTimeout(cb, 16); })(function () {
              drawQueued = false;
              renderNow();
            });
          };

          var immediateSaveView = saveView;
          var saveViewTimer = 0;
          saveView = function () {
            if (saveViewTimer) clearTimeout(saveViewTimer);
            saveViewTimer = setTimeout(function () {
              saveViewTimer = 0;
              immediateSaveView();
            }, performanceMode ? 180 : 80);
          };
          window.__mithrilFlushShotView = function () {
            if (saveViewTimer) { clearTimeout(saveViewTimer); saveViewTimer = 0; }
            immediateSaveView();
            lastUiUpdate = 0;
            draw();
          };

          if (performanceMode) {
            resizeCanvas();
            window.addEventListener("resize", function () { setTimeout(resizeCanvas, 0); });
            window.addEventListener("orientationchange", function () { setTimeout(resizeCanvas, 60); });
          }
          window.addEventListener("pagehide", window.__mithrilFlushShotView);
          console.log("MITHRIL m38.5 shot canvas mode:", performanceMode ? "legacy performance" : "standard");
        })();
      `;
      doc.body.appendChild(performanceScript);

      const legacyTouchScript = doc.createElement("script");
      legacyTouchScript.textContent = `
        (function () {
          if (window.__mithrilShotLegacyTouchInstalled) return;
          window.__mithrilShotLegacyTouchInstalled = true;

          var touchCanvas = document.getElementById("shotCanvas");
          if (!touchCanvas) return;

          function stopSafariGesture(event) {
            event.preventDefault();
          }

          touchCanvas.addEventListener("gesturestart", stopSafariGesture, { passive: false });
          touchCanvas.addEventListener("gesturechange", stopSafariGesture, { passive: false });
          touchCanvas.addEventListener("gestureend", stopSafariGesture, { passive: false });

          if ("PointerEvent" in window) return;

          var touchState = {
            mode: null,
            moved: false,
            startX: 0,
            startY: 0,
            startViewX: 0,
            startViewY: 0,
            startScale: 1,
            startDist: 0,
            startCenter: null
          };

          function pointFromTouch(touch) {
            var rect = touchCanvas.getBoundingClientRect();
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
          }

          function touchDistance(first, second) {
            var a = pointFromTouch(first);
            var b = pointFromTouch(second);
            var dx = a.x - b.x;
            var dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
          }

          function touchCenter(first, second) {
            var a = pointFromTouch(first);
            var b = pointFromTouch(second);
            return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
          }

          function beginPan(touch, alreadyMoved) {
            var pt = pointFromTouch(touch);
            touchState = {
              mode: "pan",
              moved: !!alreadyMoved,
              startX: pt.x,
              startY: pt.y,
              startViewX: view.x,
              startViewY: view.y,
              startScale: view.scale,
              startDist: 0,
              startCenter: null
            };
          }

          function beginPinch(touches) {
            touchState = {
              mode: "pinch",
              moved: true,
              startX: 0,
              startY: 0,
              startViewX: view.x,
              startViewY: view.y,
              startScale: view.scale,
              startDist: touchDistance(touches[0], touches[1]),
              startCenter: touchCenter(touches[0], touches[1])
            };
          }

          function onTouchStart(event) {
            event.preventDefault();
            if (event.touches.length >= 2) beginPinch(event.touches);
            else if (event.touches.length === 1) beginPan(event.touches[0], false);
          }

          function onTouchMove(event) {
            event.preventDefault();

            if (event.touches.length >= 2) {
              if (touchState.mode !== "pinch") beginPinch(event.touches);

              var dist = touchDistance(event.touches[0], event.touches[1]);
              var center = touchCenter(event.touches[0], event.touches[1]);
              var ratio = touchState.startDist > 0 ? dist / touchState.startDist : 1;
              var newScale = Math.max(0.25, Math.min(4.0, touchState.startScale * ratio));
              var before = {
                x: (touchState.startCenter.x - touchState.startViewX) / touchState.startScale,
                y: (touchState.startCenter.y - touchState.startViewY) / touchState.startScale
              };

              view.scale = newScale;
              view.x = center.x - before.x * view.scale;
              view.y = center.y - before.y * view.scale;
              draw();
              return;
            }

            if (event.touches.length === 1) {
              if (touchState.mode !== "pan") beginPan(event.touches[0], true);
              var pt = pointFromTouch(event.touches[0]);
              var dx = pt.x - touchState.startX;
              var dy = pt.y - touchState.startY;
              if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchState.moved = true;

              view.x = touchState.startViewX + dx;
              view.y = touchState.startViewY + dy;
              draw();
            }
          }

          function onTouchEnd(event) {
            event.preventDefault();

            if (event.touches.length >= 2) {
              beginPinch(event.touches);
              return;
            }

            if (event.touches.length === 1) {
              beginPan(event.touches[0], true);
              return;
            }

            if (touchState.mode === "pan" && !touchState.moved && event.changedTouches.length) {
              var pt = pointFromTouch(event.changedTouches[0]);
              var worldPt = screenToWorld(pt.x, pt.y);
              var hit = hitTestHole(worldPt.x, worldPt.y);
              if (hit) {
                switchToPage(hit.pageNum);
                if (!applyQuickEntry(hit.pageNum, hit.holeId)) openHole(hit.holeId);
              }
            }

            if (window.__mithrilFlushShotView) window.__mithrilFlushShotView();
            else saveView();
            touchState.mode = null;
            touchState.moved = false;
          }

          function onTouchCancel(event) {
            event.preventDefault();
            if (window.__mithrilFlushShotView) window.__mithrilFlushShotView();
            else saveView();
            touchState.mode = null;
            touchState.moved = false;
          }

          touchCanvas.addEventListener("touchstart", onTouchStart, { passive: false });
          touchCanvas.addEventListener("touchmove", onTouchMove, { passive: false });
          touchCanvas.addEventListener("touchend", onTouchEnd, { passive: false });
          touchCanvas.addEventListener("touchcancel", onTouchCancel, { passive: false });
        })();
      `;
      doc.body.appendChild(legacyTouchScript);

      fallbackHome.style.display = "none";
    } catch (error) {
      console.error("MITHRIL Shot Diagram compatibility setup failed.", error);
      fallbackHome.style.display = "block";
    }
  });
})();
</script>
</body>
</html>
