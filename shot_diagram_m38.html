<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#171717" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MITHRIL" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" sizes="192x192" href="./icons/mithril-192.png?v=38.4" />
<link rel="apple-touch-icon-precomposed" sizes="192x192" href="./icons/mithril-192.png?v=38.4" />
<link rel="icon" type="image/png" sizes="192x192" href="./icons/mithril-192.png?v=38.4" />
<link rel="icon" type="image/png" sizes="512x512" href="./icons/mithril-512.png?v=38.4" />
<title>MITHRIL Shot Diagram m38.4</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #242424;
  }
  #shotFrame {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: #242424;
  }
  #fallbackHome {
    display: none;
    position: fixed;
    left: 8px;
    top: 8px;
    z-index: 1000;
    min-height: 40px;
    border: 1px solid #777;
    border-radius: 8px;
    background: #fff;
    color: #111;
    padding: 6px 10px;
    font: 800 14px Arial, sans-serif;
  }
</style>
</head>
<body>
<button id="fallbackHome" type="button">MITHRIL Home</button>
<iframe id="shotFrame" src="./shot_diagram_m34.html" title="MITHRIL Shot Diagram"></iframe>
<script>
(() => {
  "use strict";

  const frame = document.getElementById("shotFrame");
  const fallbackHome = document.getElementById("fallbackHome");

  function homeURL() {
    return "./index.html?refresh=" + Date.now();
  }

  function saveShotState() {
    try {
      const shotWindow = frame.contentWindow;
      if (shotWindow && typeof shotWindow.saveData === "function") shotWindow.saveData();
      if (shotWindow && typeof shotWindow.saveView === "function") shotWindow.saveView();
    } catch (error) {
      console.warn("MITHRIL could not call the shot save functions before returning Home.", error);
    }
  }

  function goHome() {
    saveShotState();
    window.location.href = homeURL();
  }

  fallbackHome.addEventListener("click", goHome);

  frame.addEventListener("load", () => {
    try {
      const doc = frame.contentDocument;
      if (!doc) throw new Error("Shot Diagram document was unavailable.");

      doc.title = "MITHRIL Shot Diagram m38.4";

      const injectedStyle = doc.createElement("style");
      injectedStyle.textContent = `
        html, body { width: 100% !important; }
        header {
          top: 0 !important;
          right: 0 !important;
          bottom: auto !important;
          left: 0 !important;
          width: 100% !important;
        }
        .modal {
          top: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          left: 0 !important;
        }
        .brand.mithrilHomeLink {
          cursor: pointer;
          border: 0;
          border-radius: 8px;
          background: transparent;
          padding: 0;
          min-height: 36px;
          user-select: none;
        }
        .brand.mithrilHomeLink:active { opacity: .72; }
        .brand.mithrilHomeLink .mark {
          display: block;
          width: 34px;
          height: 34px;
          border-radius: 8px;
          object-fit: cover;
          background: none;
          color: transparent;
          flex: 0 0 auto;
        }
      `;
      doc.head.appendChild(injectedStyle);

      const brand = doc.querySelector(".brand");
      if (!brand) throw new Error("Shot Diagram brand area was not found.");

      const oldMark = brand.querySelector(".mark");
      if (oldMark) {
        const icon = doc.createElement("img");
        icon.className = "mark";
        icon.src = "./icons/mithril-192.png?v=38.4";
        icon.alt = "MITHRIL";
        icon.addEventListener("error", () => {
          icon.src = "https://zscurtis.github.io/mithril_mobile/icons/mithril-192.png?v=38.4";
        }, { once: true });
        oldMark.replaceWith(icon);
      }

      const brandText = brand.querySelector(".brandText");
      if (brandText) brandText.textContent = "SHOT DIAGRAM";

      const version = brand.querySelector(".version");
      if (version) version.textContent = "m38.4";

      brand.classList.add("mithrilHomeLink");
      brand.setAttribute("role", "button");
      brand.setAttribute("tabindex", "0");
      brand.setAttribute("aria-label", "Save Shot Diagram and return to MITHRIL Home");
      brand.setAttribute("title", "MITHRIL Home / Choose Template");
      brand.addEventListener("click", goHome);
      brand.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goHome();
        }
      });

      const menuModal = doc.getElementById("menuModal");
      const firstMenuGrid = menuModal ? menuModal.querySelector(".menuGrid") : null;
      if (firstMenuGrid && !doc.getElementById("mithrilHomeMenuButton")) {
        const homeButton = doc.createElement("button");
        homeButton.id = "mithrilHomeMenuButton";
        homeButton.type = "button";
        homeButton.className = "wide";
        homeButton.textContent = "Home / Choose Template";
        homeButton.addEventListener("click", goHome);
        firstMenuGrid.prepend(homeButton);
      }

      const legacyTouchScript = doc.createElement("script");
      legacyTouchScript.textContent = `
        (function () {
          if (window.__mithrilShotLegacyTouchInstalled) return;
          window.__mithrilShotLegacyTouchInstalled = true;

          var touchCanvas = document.getElementById("shotCanvas");
          if (!touchCanvas) return;

          function stopSafariGesture(event) {
            event.preventDefault();
          }

          touchCanvas.addEventListener("gesturestart", stopSafariGesture, { passive: false });
          touchCanvas.addEventListener("gesturechange", stopSafariGesture, { passive: false });
          touchCanvas.addEventListener("gestureend", stopSafariGesture, { passive: false });

          if ("PointerEvent" in window) return;

          var touchState = {
            mode: null,
            moved: false,
            startX: 0,
            startY: 0,
            startViewX: 0,
            startViewY: 0,
            startScale: 1,
            startDist: 0,
            startCenter: null
          };

          function pointFromTouch(touch) {
            var rect = touchCanvas.getBoundingClientRect();
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
          }

          function touchDistance(first, second) {
            var a = pointFromTouch(first);
            var b = pointFromTouch(second);
            var dx = a.x - b.x;
            var dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
          }

          function touchCenter(first, second) {
            var a = pointFromTouch(first);
            var b = pointFromTouch(second);
            return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
          }

          function beginPan(touch, alreadyMoved) {
            var pt = pointFromTouch(touch);
            touchState = {
              mode: "pan",
              moved: !!alreadyMoved,
              startX: pt.x,
              startY: pt.y,
              startViewX: view.x,
              startViewY: view.y,
              startScale: view.scale,
              startDist: 0,
              startCenter: null
            };
          }

          function beginPinch(touches) {
            touchState = {
              mode: "pinch",
              moved: true,
              startX: 0,
              startY: 0,
              startViewX: view.x,
              startViewY: view.y,
              startScale: view.scale,
              startDist: touchDistance(touches[0], touches[1]),
              startCenter: touchCenter(touches[0], touches[1])
            };
          }

          function onTouchStart(event) {
            event.preventDefault();
            if (event.touches.length >= 2) beginPinch(event.touches);
            else if (event.touches.length === 1) beginPan(event.touches[0], false);
          }

          function onTouchMove(event) {
            event.preventDefault();

            if (event.touches.length >= 2) {
              if (touchState.mode !== "pinch") beginPinch(event.touches);

              var dist = touchDistance(event.touches[0], event.touches[1]);
              var center = touchCenter(event.touches[0], event.touches[1]);
              var ratio = touchState.startDist > 0 ? dist / touchState.startDist : 1;
              var newScale = Math.max(0.25, Math.min(4.0, touchState.startScale * ratio));
              var before = {
                x: (touchState.startCenter.x - touchState.startViewX) / touchState.startScale,
                y: (touchState.startCenter.y - touchState.startViewY) / touchState.startScale
              };

              view.scale = newScale;
              view.x = center.x - before.x * view.scale;
              view.y = center.y - before.y * view.scale;
              saveView();
              draw();
              return;
            }

            if (event.touches.length === 1) {
              if (touchState.mode !== "pan") beginPan(event.touches[0], true);
              var pt = pointFromTouch(event.touches[0]);
              var dx = pt.x - touchState.startX;
              var dy = pt.y - touchState.startY;
              if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchState.moved = true;

              view.x = touchState.startViewX + dx;
              view.y = touchState.startViewY + dy;
              saveView();
              draw();
            }
          }

          function onTouchEnd(event) {
            event.preventDefault();

            if (event.touches.length >= 2) {
              beginPinch(event.touches);
              return;
            }

            if (event.touches.length === 1) {
              beginPan(event.touches[0], true);
              return;
            }

            if (touchState.mode === "pan" && !touchState.moved && event.changedTouches.length) {
              var pt = pointFromTouch(event.changedTouches[0]);
              var worldPt = screenToWorld(pt.x, pt.y);
              var hit = hitTestHole(worldPt.x, worldPt.y);
              if (hit) {
                switchToPage(hit.pageNum);
                if (!applyQuickEntry(hit.pageNum, hit.holeId)) openHole(hit.holeId);
              }
            }

            saveView();
            touchState.mode = null;
            touchState.moved = false;
          }

          function onTouchCancel(event) {
            event.preventDefault();
            saveView();
            touchState.mode = null;
            touchState.moved = false;
          }

          touchCanvas.addEventListener("touchstart", onTouchStart, { passive: false });
          touchCanvas.addEventListener("touchmove", onTouchMove, { passive: false });
          touchCanvas.addEventListener("touchend", onTouchEnd, { passive: false });
          touchCanvas.addEventListener("touchcancel", onTouchCancel, { passive: false });
        })();
      `;
      doc.body.appendChild(legacyTouchScript);

      fallbackHome.style.display = "none";
    } catch (error) {
      console.error("MITHRIL Shot Diagram compatibility setup failed.", error);
      fallbackHome.style.display = "block";
    }
  });
})();
</script>
</body>
</html>
